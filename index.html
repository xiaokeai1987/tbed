<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="BigJackson的在线共享图片站：支持图片上传、分享、点赞与热门/最新分类，提供快速图片代理与分页浏览体验。" />
    <meta name="keywords" content="共享图片, 图片上传, 图片分享, 在线相册, 热门图片, 最新图片, 图床, Telegraph, Cloudflare, BigJackson" />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content="BigJackson的在线共享图片站" />
    <meta property="og:description" content="上传并分享你的图片，支持点赞与热门/最新浏览，快速代理加速。" />
    <meta property="og:type" content="website" />
    <title>BigJackson的共享图片站</title>
    <link rel="icon" href="favicon.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body>
    <header class="header">
      <h1>BigJackson的在线共享图片站</h1>
      <p>上传图片，主页展示；支持点赞与热门/最新分类</p>
      <p>
        <a href="/admin" style="color: var(--accent); text-decoration: none;">进入管理后台</a>
      </p>
      <p class="open-source">该项目已在 GitHub 开源：<a href="https://github.com/tud8951/tbed" target="_blank" rel="noopener" style="color: var(--accent); text-decoration: none;">查看仓库</a></p>
      <p id="siteCount" class="site-count"></p>
    </header>

    <section class="upload">
      <div class="upload-card">
        <div id="dropzone" class="dropzone">
          <div class="dz-text">拖拽图片到此或点击选择</div>
          <button id="chooseBtn" class="btn">选择图片</button>
          <input id="fileInput" type="file" accept="image/png,image/jpeg" hidden />
        </div>
        <div id="preview" class="preview hidden">
          <img id="previewImg" alt="预览">
          <div class="preview-meta">
            <span id="previewName"></span>
            <span id="previewSize"></span>
          </div>
        </div>
        <div class="actions">
          <button id="uploadBtn" class="btn primary">上传</button>
          <div id="uploadStatus" class="status"></div>
        </div>
      </div>
    </section>

    <section class="tabs">
      <div class="tab-buttons">
        <button class="tab-btn" data-sort="latest">最新发布</button>
        <button class="tab-btn" data-sort="hot">最热门</button>
      </div>
    </section>
    <section class="pager">
      <div class="pager-bar">
        <button id="prevPage" class="btn primary">上一页</button>
        <span id="pageInfo" class="status">第 1 页</span>
        <button id="nextPage" class="btn primary">下一页</button>
      </div>
      <div id="pageNumbers" class="page-numbers"></div>
    </section>

    <main id="gallery" class="gallery"></main>
    <div id="sentinel" style="height:1px; display:none;"></div>

    <section class="pager bottom-only">
      <div class="pager-bar">
        <button id="prevPageBottom" class="btn primary">上一页</button>
        <span id="pageInfoBottom" class="status">第 1 页</span>
        <button id="nextPageBottom" class="btn primary">下一页</button>
      </div>
      <div id="pageNumbersBottom" class="page-numbers"></div>
    </section>
    <div id="lightbox" class="lightbox hidden"><img id="lightboxImg" alt="image"></div>

    <script src="assets/app.js"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>管理后台</title>
    <link rel="icon" href="favicon.jpg" type="image/jpeg" />
    <link rel="stylesheet" href="assets/style.css" />
    <style>
      .admin { padding: 16px; }
      .login { display: flex; gap: 8px; padding: 16px; border-bottom: 1px solid var(--border); }
      .login input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); }
      .list { padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
      .item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
      .item img { width: 100%; height: 180px; object-fit: cover; background: #0a0d11; }
      .item .meta { padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>管理后台</h1>
      <p>输入密码进入后台，进行图片删除操作</p>
    </header>
    <section class="admin">
      <div class="login">
        <input id="pwd" type="password" placeholder="输入后台密码" />
        <button id="enterBtn" class="btn primary">进入后台</button>
        <span id="loginStatus" class="status"></span>
      </div>
      <div id="adminPanel" class="hidden">
        <div class="login" style="border-bottom: none;">
          <label style="display:flex;align-items:center;gap:8px;">
            <input id="allowUpload" type="checkbox" />
            允许上传新图片
          </label>
          <label style="display:flex;align-items:center;gap:8px;margin-left:16px;">
            <input id="filterEnable" type="checkbox" />
            开启图片过滤
          </label>
          <label style="display:flex;align-items:center;gap:8px;margin-left:16px;">
            <span>过滤账号</span>
            <select id="seSelect" style="padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--text);">
              <option value="0">加载中...</option>
            </select>
          </label>
          <span id="settingsStatus" class="status"></span>
        </div>
        <section class="pager" style="border-top: 1px solid var(--border);">
          <div class="pager-bar">
            <button id="adminPrev" class="btn primary">上一页</button>
            <span id="adminPageInfo" class="status">第 1 页</span>
            <button id="adminNext" class="btn primary">下一页</button>
          </div>
          <div id="adminPageNumbers" class="page-numbers"></div>
        </section>
        <div class="list" id="adminList"></div>
        <section class="pager bottom-only">
          <div class="pager-bar">
            <button id="adminPrevBottom" class="btn primary">上一页</button>
            <span id="adminPageInfoBottom" class="status">第 1 页</span>
            <button id="adminNextBottom" class="btn primary">下一页</button>
          </div>
          <div id="adminPageNumbersBottom" class="page-numbers"></div>
        </section>
      </div>
    </section>
    <div id="lightbox" class="lightbox hidden"><img id="lightboxImg" alt="image"></div>
    <script src="assets/admin.js"></script>
  </body>
</html>
